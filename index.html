<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InstaLily Mail</title>
  <meta name="description" content="InstaLily Mail – Gmail-style inbox for your sales team's B2B conversations." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app-container">

  <!-- TOP BAR -->
  <header class="topbar">
    <a class="topbar-logo" href="#" aria-label="InstaLily Mail">
      <div class="logo-icon">
        <!-- Lily flower SVG logo mark -->
        <svg class="logo-svg" viewBox="0 0 40 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="14" r="5" fill="#1a73e8"/>
          <ellipse cx="20" cy="5" rx="3.5" ry="5" fill="#34a853" transform="rotate(-15 20 5)"/>
          <ellipse cx="28" cy="9" rx="3.5" ry="5" fill="#fbbc04" transform="rotate(45 28 9)"/>
          <ellipse cx="28" cy="19" rx="3.5" ry="5" fill="#ea4335" transform="rotate(105 28 19)"/>
          <ellipse cx="20" cy="23" rx="3.5" ry="5" fill="#1a73e8" transform="rotate(165 20 23)"/>
          <ellipse cx="12" cy="19" rx="3.5" ry="5" fill="#34a853" transform="rotate(-105 12 19)"/>
          <ellipse cx="12" cy="9" rx="3.5" ry="5" fill="#fbbc04" transform="rotate(-45 12 9)"/>
        </svg>
      </div>
      <span class="logo-text">Insta<span>Lily</span></span>
    </a>

    <div class="search-bar">
      <span class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
      <input type="search" id="search-input" placeholder="Search mail" autocomplete="off" aria-label="Search mail" />
    </div>

    <div class="topbar-actions">
      <button class="icon-btn" id="dark-toggle" data-tooltip="Toggle dark mode" aria-label="Toggle dark mode">
        <!-- Moon icon (default light mode) -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="icon-btn" data-tooltip="Settings" aria-label="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="icon-btn" data-tooltip="Google apps" aria-label="Google apps">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="4" height="4" rx="0.5"/><rect x="10" y="3" width="4" height="4" rx="0.5"/><rect x="17" y="3" width="4" height="4" rx="0.5"/><rect x="3" y="10" width="4" height="4" rx="0.5"/><rect x="10" y="10" width="4" height="4" rx="0.5"/><rect x="17" y="10" width="4" height="4" rx="0.5"/><rect x="3" y="17" width="4" height="4" rx="0.5"/><rect x="10" y="17" width="4" height="4" rx="0.5"/><rect x="17" y="17" width="4" height="4" rx="0.5"/></svg>
      </button>
      <button class="avatar-btn" aria-label="Account" title="sales@instalily.com">SL</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar" role="navigation" aria-label="Mailbox folders">

    <button class="compose-btn" id="compose-btn" aria-label="Compose new email">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span>Compose</span>
    </button>

    <div class="nav-section">
      <button class="nav-item active" data-label="inbox" aria-label="Inbox">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
        <span class="nav-label">Inbox</span>
        <span class="nav-badge" id="inbox-badge"></span>
      </button>

      <button class="nav-item" data-label="starred" aria-label="Starred">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span class="nav-label">Starred</span>
      </button>

      <button class="nav-item" data-label="sent" aria-label="Sent">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        <span class="nav-label">Sent</span>
      </button>

      <button class="nav-item" data-label="drafts" aria-label="Drafts">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span class="nav-label">Drafts</span>
      </button>

      <div class="nav-divider"></div>

      <button class="nav-item" data-label="spam" aria-label="Spam">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span class="nav-label">Spam</span>
      </button>

      <button class="nav-item" data-label="trash" aria-label="Trash">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        <span class="nav-label">Trash</span>
      </button>
    </div>
  </nav>

  <!-- MAIN AREA (email list + reader) -->
  <main style="display:flex;overflow:hidden;height:100%">

    <!-- EMAIL LIST PANEL -->
    <section class="email-list-panel fullwidth" id="email-list-panel" aria-label="Email list">
      <div class="list-toolbar">
        <span class="list-toolbar-title">Inbox</span>
      </div>
      <div class="email-list" id="email-list" role="list" aria-label="Emails"></div>
    </section>

    <!-- EMAIL READER PANEL -->
    <section class="email-reader" id="email-reader" style="flex:1;display:none" aria-label="Email reader">
      <!-- Populated by JS -->
    </section>

  </main>

</div><!-- .app-container -->

<!-- COMPOSE OVERLAY -->
<div class="compose-overlay" id="compose-overlay" role="dialog" aria-modal="true" aria-label="Compose new message">
  <div class="compose-modal">
    <div class="compose-header">
      <span>New Message</span>
      <button class="compose-close" aria-label="Close compose">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="compose-field">
      <label for="compose-to">To</label>
      <input type="email" id="compose-to" placeholder="" autocomplete="email" />
    </div>
    <div class="compose-field">
      <label for="compose-subject">Sub</label>
      <input type="text" id="compose-subject" placeholder="" />
    </div>
    <textarea class="compose-body" id="compose-body" placeholder="Write your message..."></textarea>
    <div class="compose-footer">
      <button class="send-btn" id="send-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Send
      </button>
      <div style="flex:1"></div>
      <button class="icon-btn" aria-label="Formatting">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
      </button>
      <button class="icon-btn" aria-label="Attach file">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <button class="icon-btn" aria-label="Delete draft" onclick="document.getElementById('compose-overlay').classList.remove('open')">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
